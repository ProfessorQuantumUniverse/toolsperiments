<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Shelly Finder – finde in wenigen Fragen das passende Shelly-Gerät: Relais, Dimmer, Rollladen, Energiemesser, Stecker, Sensoren und mehr." />
<title>Shelly Finder — Welches Shelly passt zu dir?</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============ Tokens ============ */
:root{
  --paper:#E9EAE3;
  --paper2:#F3F4EE;
  --white:#FFFFFF;
  --ink:#16181C;
  --ink2:#4A4E57;
  --ink3:#7B808A;
  --line:rgba(22,24,28,.14);
  --line2:rgba(22,24,28,.28);
  --lime:#A6D400;
  --lime-bright:#B7E60A;
  --lime-deep:#6E9600;
  --lime-ink:#3C5200;
  --slate:#5B6370;
  --danger:#C4451F;
  --radius:14px;
  --radius-s:10px;
  --shadow:0 1px 0 rgba(22,24,28,.05), 0 12px 34px -22px rgba(22,24,28,.45);
  --mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans:'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --disp:'Space Grotesk', var(--sans);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--paper);
  background-image:
    linear-gradient(0deg, rgba(22,24,28,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(22,24,28,.02) 1px, transparent 1px);
  background-size:28px 28px;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  min-height:100vh;
}
a{color:inherit}
button{font-family:inherit}

/* ============ Shell ============ */
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header.site{
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,0));
  position:sticky;top:0;z-index:20;backdrop-filter:blur(6px);
}
.site .wrap{display:flex;align-items:center;gap:14px;height:64px}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo .mark{
  width:30px;height:30px;border-radius:8px;flex:0 0 auto;
  background:var(--lime);border:1.5px solid var(--lime-deep);
  display:grid;place-items:center;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.35);
}
.logo .mark span{width:8px;height:8px;background:var(--ink);border-radius:2px}
.logo b{font-family:var(--disp);font-weight:700;letter-spacing:-.01em;font-size:1.05rem}
.logo small{font-family:var(--mono);font-size:.66rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.14em;display:block;margin-top:-2px}
.site .spacer{flex:1}
.ghost{
  font-family:var(--mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ink2);background:transparent;border:1px solid var(--line2);
  padding:8px 12px;border-radius:999px;cursor:pointer;transition:.15s;
}
.ghost:hover{border-color:var(--ink);color:var(--ink)}
.ghost:focus-visible{outline:2px solid var(--lime-deep);outline-offset:2px}

/* ============ Layout grid ============ */
.stage{display:grid;grid-template-columns:1fr;gap:34px;padding:38px 0 90px}
@media(min-width:1000px){
  .stage{grid-template-columns:238px minmax(0,1fr);gap:52px;padding:52px 0 110px}
}

/* ============ Wiring spine (progress) ============ */
.spine{display:none}
@media(min-width:1000px){
  .spine{display:block;position:sticky;top:96px;align-self:start}
}
.spine h2{
  font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;
  color:var(--ink3);font-weight:500;margin:0 0 18px 4px;
}
.trail{position:relative;padding-left:26px}
.trail::before{
  content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;
  background:var(--line2);border-radius:2px;
}
.trail .fill{
  content:"";position:absolute;left:7px;top:6px;width:2px;background:var(--lime);
  border-radius:2px;transition:height .45s cubic-bezier(.2,.7,.2,1);
}
.node{position:relative;margin-bottom:16px;min-height:16px}
.node .dot{
  position:absolute;left:-26px;top:2px;width:16px;height:16px;border-radius:50%;
  background:var(--paper);border:2px solid var(--line2);transition:.3s;
}
.node.done .dot{background:var(--lime);border-color:var(--lime-deep);box-shadow:0 0 0 4px rgba(166,212,0,.18)}
.node.active .dot{background:var(--white);border-color:var(--ink);box-shadow:0 0 0 4px rgba(22,24,28,.08)}
.node .lbl{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);display:block;line-height:1.3}
.node .val{font-size:.86rem;font-weight:500;color:var(--ink);margin-top:1px;line-height:1.35}
.node.active .val{color:var(--ink)}
.node:not(.done):not(.active) .val{color:var(--ink3)}

/* ============ Mobile progress ============ */
.mprog{display:flex;align-items:center;gap:12px;margin-bottom:24px}
@media(min-width:1000px){.mprog{display:none}}
.mprog .bar{flex:1;height:6px;background:var(--line);border-radius:6px;overflow:hidden}
.mprog .bar i{display:block;height:100%;background:var(--lime);border-radius:6px;transition:width .4s cubic-bezier(.2,.7,.2,1)}
.mprog .pct{font-family:var(--mono);font-size:.72rem;color:var(--ink2);white-space:nowrap}

/* ============ Panel (question) ============ */
.panel{max-width:820px}
.panel .eyebrow{
  font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;
  color:var(--lime-deep);font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.panel .eyebrow::before{content:"";width:22px;height:2px;background:var(--lime-deep);display:inline-block}
.panel h1{
  font-family:var(--disp);font-weight:700;letter-spacing:-.02em;line-height:1.06;
  font-size:clamp(1.7rem,4.4vw,2.7rem);margin:0 0 10px;
}
.panel .lede{color:var(--ink2);font-size:1.02rem;max-width:60ch;margin:0 0 28px}

.opts{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:560px){.opts.cols-2{grid-template-columns:1fr 1fr}}
.opt{
  display:flex;align-items:center;gap:16px;text-align:left;width:100%;
  background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;cursor:pointer;transition:.16s cubic-bezier(.2,.7,.2,1);
  box-shadow:0 1px 0 rgba(22,24,28,.03);
}
.opt:hover{border-color:var(--ink);transform:translateY(-1px);box-shadow:var(--shadow)}
.opt:focus-visible{outline:2px solid var(--lime-deep);outline-offset:2px}
.opt .ic{flex:0 0 auto;width:52px;height:52px;border-radius:11px;background:var(--paper2);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden}
.opt .ic svg{width:44px;height:44px;display:block}
.opt .txt b{display:block;font-weight:600;font-size:1.02rem;letter-spacing:-.01em}
.opt .txt span{display:block;color:var(--ink2);font-size:.86rem;margin-top:2px;line-height:1.4}
.opt .chev{margin-left:auto;flex:0 0 auto;color:var(--ink3);transition:.16s}
.opt:hover .chev{color:var(--ink);transform:translateX(2px)}
.opt.sel{background:var(--lime);border-color:var(--lime-deep)}
.opt.sel .txt span{color:var(--lime-ink)}
.opt.sel .ic{background:rgba(255,255,255,.55);border-color:rgba(60,82,0,.25)}

.navrow{display:flex;align-items:center;gap:14px;margin-top:30px}
.back{
  font-family:var(--mono);font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ink2);background:transparent;border:none;cursor:pointer;padding:8px 4px;display:inline-flex;align-items:center;gap:8px;
}
.back:hover{color:var(--ink)}
.back:disabled{opacity:.35;cursor:default}
.hint{font-size:.82rem;color:var(--ink3);margin-left:auto;font-family:var(--mono)}

/* ============ Result ============ */
.result{max-width:900px}
.result .eyebrow{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;color:var(--lime-deep);font-weight:600;margin-bottom:14px}
.result h1{font-family:var(--disp);font-weight:700;letter-spacing:-.02em;font-size:clamp(1.6rem,4vw,2.4rem);margin:0 0 4px;line-height:1.08}
.result .sub{color:var(--ink2);margin:0 0 30px;max-width:60ch}

.hero{
  display:grid;grid-template-columns:1fr;gap:0;border:1px solid var(--ink);border-radius:18px;overflow:hidden;background:var(--white);box-shadow:var(--shadow);
}
@media(min-width:680px){.hero{grid-template-columns:230px 1fr}}
.hero .shot{
  background:radial-gradient(120% 120% at 30% 20%, #23262e 0%, #141519 70%);
  display:grid;place-items:center;padding:26px;position:relative;min-height:190px;
}
.hero .shot::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 45%, rgba(166,212,0,.22), transparent 70%);pointer-events:none}
.hero .shot svg{width:150px;height:150px;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));position:relative;z-index:1}
.hero .body{padding:24px 26px}
.badge-gen{display:inline-block;font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;background:var(--ink);color:var(--paper2);padding:4px 9px;border-radius:6px;margin-bottom:12px}
.hero .body h2{font-family:var(--disp);font-weight:700;font-size:1.6rem;letter-spacing:-.02em;margin:0 0 6px;line-height:1.1}
.hero .body .blurb{color:var(--ink2);margin:0 0 16px;font-size:.98rem}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 18px}
.chip{font-family:var(--mono);font-size:.68rem;letter-spacing:.04em;padding:4px 9px;border-radius:999px;background:var(--paper2);border:1px solid var(--line);color:var(--ink2)}
.chip.pm{background:rgba(166,212,0,.2);border-color:var(--lime-deep);color:var(--lime-ink)}
.price{font-family:var(--disp);font-weight:600;font-size:1.15rem}
.price small{font-family:var(--mono);font-weight:400;font-size:.72rem;color:var(--ink3);display:block;text-transform:uppercase;letter-spacing:.1em}

.specsheet{margin-top:26px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--white)}
.specsheet .row{display:grid;grid-template-columns:150px 1fr;gap:0;border-bottom:1px solid var(--line)}
.specsheet .row:last-child{border-bottom:none}
.specsheet .k{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);padding:11px 16px;background:var(--paper2);border-right:1px solid var(--line)}
.specsheet .v{padding:11px 16px;font-size:.92rem}
@media(max-width:520px){.specsheet .row{grid-template-columns:120px 1fr}}

.why{margin-top:26px}
.why h3{font-family:var(--mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2);margin:0 0 12px}
.why ul{list-style:none;margin:0;padding:0;display:grid;gap:9px}
.why li{display:flex;gap:11px;font-size:.95rem;color:var(--ink);align-items:flex-start}
.why li svg{flex:0 0 auto;margin-top:3px;color:var(--lime-deep)}
.note{margin-top:16px;font-size:.88rem;color:var(--ink2);background:var(--paper2);border:1px solid var(--line);border-left:3px solid var(--lime-deep);border-radius:8px;padding:12px 15px}
.note b{font-weight:600}

.alts{margin-top:34px}
.alts h3{font-family:var(--mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2);margin:0 0 14px}
.altgrid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:600px){.altgrid{grid-template-columns:1fr 1fr}}
.altcard{display:flex;gap:14px;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.altcard .ic{flex:0 0 auto;width:54px;height:54px;border-radius:11px;background:#181a1f;display:grid;place-items:center}
.altcard .ic svg{width:44px;height:44px}
.altcard b{font-weight:600;font-size:.98rem;letter-spacing:-.01em;display:block}
.altcard span{font-size:.82rem;color:var(--ink2);display:block;margin-top:2px;line-height:1.35}
.altcard .p{font-family:var(--mono);font-size:.76rem;color:var(--ink3);margin-top:4px;display:block}

.cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:34px}
.btn{
  font-family:var(--mono);font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;font-weight:500;
  padding:13px 20px;border-radius:999px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:9px;transition:.16s;border:1px solid transparent;
}
.btn.primary{background:var(--ink);color:var(--paper2)}
.btn.primary:hover{background:#000}
.btn.line{background:transparent;border-color:var(--line2);color:var(--ink)}
.btn.line:hover{border-color:var(--ink)}
.btn:focus-visible{outline:2px solid var(--lime-deep);outline-offset:2px}

.disclaimer{margin-top:46px;padding-top:22px;border-top:1px solid var(--line);font-size:.8rem;color:var(--ink3);max-width:70ch}

/* ============ Intro ============ */
.intro{max-width:760px}
.intro h1{font-family:var(--disp);font-weight:700;letter-spacing:-.025em;line-height:1.02;font-size:clamp(2.1rem,6.5vw,3.6rem);margin:0 0 18px}
.intro h1 .hl{color:var(--lime-deep);position:relative;white-space:nowrap}
.intro .lede{font-size:1.12rem;color:var(--ink2);max-width:58ch;margin:0 0 30px}
.startbtn{
  font-family:var(--mono);font-size:.9rem;text-transform:uppercase;letter-spacing:.1em;font-weight:500;
  background:var(--lime);color:var(--ink);border:1.5px solid var(--lime-deep);
  padding:16px 26px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:12px;transition:.18s;
  box-shadow:0 12px 30px -14px rgba(110,150,0,.8);
}
.startbtn:hover{transform:translateY(-2px);box-shadow:0 18px 40px -16px rgba(110,150,0,.9)}
.startbtn:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
.introstats{display:flex;flex-wrap:wrap;gap:26px;margin-top:44px}
.introstats div{border-left:2px solid var(--lime);padding-left:14px}
.introstats b{font-family:var(--disp);font-weight:700;font-size:1.7rem;display:block;line-height:1}
.introstats span{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}

.fade-in{animation:fade .38s cubic-bezier(.2,.7,.2,1)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

footer.site{border-top:1px solid var(--line);padding:26px 0;color:var(--ink3);font-size:.8rem}
footer.site .wrap{display:flex;flex-wrap:wrap;gap:8px 20px;align-items:center}
footer .mono{font-family:var(--mono);letter-spacing:.04em}

/* ============================================================
   ANIMATIONS — modern, quirky micro-interactions
   ============================================================ */

/* --- animated ambient background blobs --- */
body::before{
  content:"";position:fixed;inset:-20% -10% auto -10%;height:75vh;z-index:-1;pointer-events:none;
  background:
    radial-gradient(38% 55% at 18% 20%, rgba(166,212,0,.20), transparent 70%),
    radial-gradient(32% 48% at 82% 12%, rgba(121,179,255,.14), transparent 70%),
    radial-gradient(30% 50% at 60% 85%, rgba(183,230,10,.14), transparent 72%);
  filter:blur(8px);
  animation:auroraDrift 22s ease-in-out infinite alternate;
}
@keyframes auroraDrift{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(3%,2%,0) scale(1.08)}
  100%{transform:translate3d(-3%,-1%,0) scale(1.04)}
}

/* --- product render: glossy depth + gentle life --- */
.opt .ic svg,.altcard .ic svg,.hero .shot svg{
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.28));
  transition:transform .5s cubic-bezier(.2,.9,.25,1.2);
}
.opt:hover .ic svg{transform:translateY(-2px) rotate(-3deg) scale(1.06)}
.opt:active .ic svg{transform:scale(.96)}
.opt .ic{position:relative;overflow:hidden}
.opt .ic::after{ /* sheen sweep on hover */
  content:"";position:absolute;top:-60%;left:-120%;width:60%;height:220%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
  transform:rotate(8deg);transition:none;
}
.opt:hover .ic::after{animation:sheen .7s ease}
@keyframes sheen{from{left:-120%}to{left:160%}}

/* --- pulsing LED elements inside renders --- */
.led-ring{transform-origin:center;animation:ledRing 2.6s ease-in-out infinite}
@keyframes ledRing{0%,100%{opacity:.55;stroke-width:3}50%{opacity:1;stroke-width:4.2}}
.led-dot{transform-origin:center;animation:ledDot 2s ease-in-out infinite}
.led-dot:nth-of-type(2){animation-delay:.25s}
.led-dot:nth-of-type(3){animation-delay:.5s}
.led-dot:nth-of-type(4){animation-delay:.75s}
@keyframes ledDot{0%,100%{opacity:.4}50%{opacity:1;filter:drop-shadow(0 0 3px #B7E60A)}}
.screen-text{animation:screenFlicker 4s steps(1) infinite}
@keyframes screenFlicker{0%,97%,100%{opacity:1}98%{opacity:.55}}

/* --- staggered card entrance --- */
.opt{opacity:0;animation:optIn .5s cubic-bezier(.2,.8,.2,1) forwards}
.opt:nth-child(1){animation-delay:.04s}.opt:nth-child(2){animation-delay:.10s}
.opt:nth-child(3){animation-delay:.16s}.opt:nth-child(4){animation-delay:.22s}
.opt:nth-child(5){animation-delay:.28s}.opt:nth-child(6){animation-delay:.34s}
.opt:nth-child(7){animation-delay:.40s}.opt:nth-child(8){animation-delay:.46s}
@keyframes optIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}

/* --- selected option: satisfying pop --- */
.opt.sel{animation:pop .32s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.035)}100%{transform:scale(1)}}
.opt.sel .ic{animation:icoSpin .45s ease}
@keyframes icoSpin{0%{transform:rotate(0)}60%{transform:rotate(9deg) scale(1.12)}100%{transform:none}}

/* --- intro flourishes --- */
.intro h1{animation:riseIn .7s cubic-bezier(.2,.8,.2,1) both}
.intro .lede{animation:riseIn .7s .1s cubic-bezier(.2,.8,.2,1) both}
.intro .startbtn{animation:riseIn .7s .2s cubic-bezier(.2,.8,.2,1) both}
.introstats{animation:riseIn .7s .32s cubic-bezier(.2,.8,.2,1) both}
@keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.introstats div{transition:transform .25s cubic-bezier(.2,.8,.2,1.4)}
.introstats div:hover{transform:translateY(-4px)}
.intro h1 .hl::after{ /* animated underline sweep */
  content:"";position:absolute;left:0;right:0;bottom:.04em;height:.14em;border-radius:3px;
  background:linear-gradient(90deg,var(--lime),var(--lime-bright));
  transform:scaleX(0);transform-origin:left;animation:underline .9s .5s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes underline{to{transform:scaleX(1)}}
.startbtn svg{transition:transform .25s ease}
.startbtn:hover svg{transform:translateX(5px)}

/* --- start button living glow --- */
.startbtn{position:relative;overflow:hidden}
.startbtn::before{
  content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.5),transparent 70%);
  transform:translateX(-120%);animation:btnShine 3.2s ease-in-out infinite;
}
@keyframes btnShine{0%,60%{transform:translateX(-120%)}80%,100%{transform:translateX(120%)}}

/* --- progress bar shimmer + spine dot pulse --- */
.mprog .bar i{position:relative;overflow:hidden}
.mprog .bar i::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
  animation:barShimmer 1.8s ease-in-out infinite;
}
@keyframes barShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.node.active .dot{animation:dotPulse 1.8s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 4px rgba(22,24,28,.08)}50%{box-shadow:0 0 0 7px rgba(166,212,0,.22)}}

/* --- RESULT reveal choreography --- */
.result .eyebrow{animation:riseIn .5s both}
.result h1{animation:riseIn .55s .05s both}
.result .sub{animation:riseIn .55s .1s both}
.hero{animation:heroIn .7s .12s cubic-bezier(.2,.8,.2,1) both}
@keyframes heroIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
.hero .shot svg{animation:floatY 4.5s ease-in-out .8s infinite}
@keyframes floatY{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(1.5deg)}}
.hero .shot::before{ /* rotating halo behind hero product */
  content:"";position:absolute;top:50%;left:50%;width:230px;height:230px;margin:-115px 0 0 -115px;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(166,212,0,.35),transparent 35%,transparent 65%,rgba(183,230,10,.3));
  filter:blur(14px);animation:spin 14s linear infinite;z-index:0;
}
.hero .shot svg{position:relative;z-index:1}
@keyframes spin{to{transform:rotate(360deg)}}
.specsheet{animation:riseIn .55s .2s both}
.specsheet .row{opacity:0;animation:rowIn .45s cubic-bezier(.2,.8,.2,1) forwards}
.specsheet .row:nth-child(1){animation-delay:.30s}.specsheet .row:nth-child(2){animation-delay:.38s}
.specsheet .row:nth-child(3){animation-delay:.46s}.specsheet .row:nth-child(4){animation-delay:.54s}
@keyframes rowIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.why li{opacity:0;animation:rowIn .45s cubic-bezier(.2,.8,.2,1) forwards}
.why li:nth-child(1){animation-delay:.5s}.why li:nth-child(2){animation-delay:.6s}
.why li:nth-child(3){animation-delay:.7s}.why li:nth-child(4){animation-delay:.8s}
.why li svg{stroke-dasharray:30;stroke-dashoffset:30;animation:draw .5s ease forwards}
.why li:nth-child(1) svg{animation-delay:.6s}.why li:nth-child(2) svg{animation-delay:.7s}
.why li:nth-child(3) svg{animation-delay:.8s}.why li:nth-child(4) svg{animation-delay:.9s}
@keyframes draw{to{stroke-dashoffset:0}}
.chip{animation:chipIn .4s cubic-bezier(.2,1.3,.4,1) both}
@keyframes chipIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:none}}
.altcard{transition:transform .25s cubic-bezier(.2,.8,.2,1.3),border-color .2s,box-shadow .25s}
.altcard:hover{transform:translateY(-4px);border-color:var(--ink);box-shadow:var(--shadow)}
.altcard:hover .ic svg{animation:wiggle .5s ease}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-7deg)}75%{transform:rotate(7deg)}}
.btn.primary svg{transition:transform .25s ease}
.btn.primary:hover svg{transform:translate(3px,-3px)}

/* --- celebratory confetti burst on result --- */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;opacity:.95;
  animation:confFall linear forwards}
@keyframes confFall{
  0%{transform:translateY(-12px) rotate(0);opacity:1}
  100%{transform:translateY(105vh) rotate(720deg);opacity:.9}
}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
  body::before,.hero .shot::before{display:none}
  .opt,.specsheet .row,.why li{opacity:1!important}
  .why li svg{stroke-dashoffset:0!important}
}
</style>
</head>
